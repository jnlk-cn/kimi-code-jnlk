appId: com.ganymede.code
productName: Ganymede Code
artifactName: Ganymede-Code-${version}-${arch}.${ext}
directories:
  output: release
files:
  - dist/**
  - package.json
asar: true
asarUnpack:
  - "**/node-pty/**"
extraResources:
  - from: resources
    to: resources
    filter:
      - "**/*"
mac:
  category: public.app-category.developer-tools
  target:
    - dmg
    - zip
  hardenedRuntime: false
  gatekeeperAssess: false
  extendInfo:
    CFBundleDisplayName: Ganymede Code
    NSScreenCaptureUsageDescription: Ganymede Code 仅在你授权后截取屏幕用于 Computer Use。
dmg:
  title: Ganymede Code
